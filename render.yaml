services:
  - type: web
    name: sistema-financeiro
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        generateValue: true
      # Configure estas variáveis manualmente após criar o banco
      - key: DB_HOST
        value: your-mysql-host
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: your-db-user
      - key: DB_PASSWORD
        value: your-db-password
      - key: DB_NAME
        value: sistema_financeiro